# --- Extrait à injecter dans /opt/mozaiklabs/docker/nginx/nginx.conf ---
# (monté en read-only dans le conteneur mozaiklabs-nginx-1)
#
# Le fichier complet sur le VPS contient aussi :
#   - un catch-all default_server (ssl_reject_handshake) en tête
#   - les server blocks mozaiklabs.fr
#   - puis ce bloc ci-dessous

# =============================================================
# api.letremouille.fr
# =============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.letremouille.fr;
    return 301 https://api.letremouille.fr$request_uri;
}

# API proxy
server {
    listen 443 ssl;
    http2 on;
    server_name api.letremouille.fr;

    ssl_certificate /etc/letsencrypt/live/api.letremouille.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.letremouille.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://172.18.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
