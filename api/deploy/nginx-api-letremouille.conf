server {
    listen 80;
    server_name api.letremouille.fr;
    return 301 https://api.letremouille.fr$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.letremouille.fr;

    ssl_certificate /etc/letsencrypt/live/api.letremouille.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.letremouille.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limit: 5 req/min par IP
        limit_req zone=tremouille burst=3 nodelay;
    }
}
